<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>用户资源与预约</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <div class="title">用户端 - 资源与预约</div>
      <div class="sub">查看资源时段并进行预约（返回订单号）</div>
    </div>
    <div class="nav">
      <a class="btn" href="admin-resource.html">管理员端</a>
      <a class="btn ghost" href="index.html">首页</a>
      <button id="logoutBtn" class="btn danger" type="button">退出登录</button>
    </div>
  </div>

  <div class="card">
    <h2>资源列表</h2>
    <div class="row">
      <div class="field" style="flex: 1 1 260px;">
        <div class="label">选择资源类型</div>
        <select id="typeSelect">
          <option value="">全部类型</option>
          <option value="1">羽毛球场地</option>
          <option value="2">篮球场地</option>
          <option value="3">医生诊室</option>
          <option value="4">会议室</option>
        </select>
      </div>
      <div>
        <button id="searchBtn" class="btn primary" type="button">查询</button>
      </div>
    </div>

    <div style="height: 12px;"></div>

    <div class="row" style="justify-content: space-between;">
      <div class="small" id="pageInfo">当前页：1</div>
      <div class="row">
        <button id="prevBtn" class="btn" type="button">上一页</button>
        <button id="nextBtn" class="btn" type="button">下一页</button>
      </div>
    </div>

    <div style="height: 12px;"></div>

    <table>
      <thead>
      <tr>
        <th>资源ID</th>
        <th>资源名称</th>
        <th>总库存</th>
        <th>剩余库存</th>
        <th>操作</th>
      </tr>
      </thead>
      <tbody id="tbody">
      <tr>
        <td colspan="5" class="small">暂无数据</td>
      </tr>
      </tbody>
    </table>

    <div id="msg" class="msg" style="display:none;"></div>
  </div>
</div>

<div id="stockModalOverlay" style="position: fixed; inset: 0; background: rgba(0,0,0,.78); display: none; align-items: center; justify-content: center; z-index: 9999;">
  <div class="card" style="width: min(980px, 94vw); max-height: 86vh; overflow: auto; background: linear-gradient(180deg, rgba(8,14,26,.96), rgba(255,255,255,.03));">
    <div class="topbar" style="margin-bottom: 10px;">
      <div class="brand">
        <div class="title" id="stockModalTitle">选择库存预约</div>
        <div class="sub" id="stockModalSub">加载中…</div>
      </div>
      <button id="stockModalCloseBtn" class="btn ghost" type="button">关闭</button>
    </div>

    <div class="hint" style="margin-bottom: 12px;">
      请选择一个“可预约库存”（remainStock &gt; 0）进行预约。
    </div>

    <div id="modalMsg" class="msg" style="display:none;"></div>

    <div id="stockOptions" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 10px; margin: 14px 0;"></div>

    <div class="row" style="justify-content: flex-end;">
      <button id="confirmBookBtn" class="btn primary" type="button" disabled>确认预约</button>
      <button id="cancelBookBtn" class="btn" type="button">取消</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  const MAX_PAGE_SIZE = 10;

  const logoutBtn = document.getElementById("logoutBtn");
  logoutBtn.addEventListener("click", () => {
    SystemApi.clearToken();
    window.location.href = "login.html";
  });

  const tbody = document.getElementById("tbody");
  const msgEl = document.getElementById("msg");
  const pageInfo = document.getElementById("pageInfo");

  const typeSelectEl = document.getElementById("typeSelect");
  const searchBtn = document.getElementById("searchBtn");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");

  let current = 1;
  let hasNext = true;

  const stockModalOverlay = document.getElementById("stockModalOverlay");
  const stockModalTitle = document.getElementById("stockModalTitle");
  const stockModalSub = document.getElementById("stockModalSub");
  const stockModalCloseBtn = document.getElementById("stockModalCloseBtn");
  const cancelBookBtn = document.getElementById("cancelBookBtn");
  const confirmBookBtn = document.getElementById("confirmBookBtn");
  const stockOptionsEl = document.getElementById("stockOptions");
  const modalMsgEl = document.getElementById("modalMsg");

  let selectedStockId = "";

  function showModalMsg(text, type) {
    modalMsgEl.style.display = "block";
    modalMsgEl.classList.remove("error", "ok");
    modalMsgEl.classList.add(type === "ok" ? "ok" : "error");
    modalMsgEl.textContent = text;
  }

  function clearModalMsg() {
    modalMsgEl.style.display = "none";
    modalMsgEl.classList.remove("error", "ok");
    modalMsgEl.textContent = "";
  }

  function closeStockModal() {
    stockModalOverlay.style.display = "none";
    selectedStockId = "";
    stockOptionsEl.innerHTML = "";
    confirmBookBtn.disabled = true;
    stockModalSub.textContent = "";
    clearModalMsg();
  }

  function selectStock(stockId, btnEl) {
    selectedStockId = String(stockId || "");
    const optionBtns = stockOptionsEl.querySelectorAll("button[data-stock-id]");
    optionBtns.forEach((b) => {
      if (String(b.dataset.stockId) === selectedStockId) {
        b.classList.add("primary");
      } else {
        b.classList.remove("primary");
      }
    });
    confirmBookBtn.disabled = !selectedStockId;
  }

  async function openStockModal(resourceId) {
    closeStockModal();
    stockModalOverlay.style.display = "flex";
    stockModalSub.textContent = "加载库存中…";
    clearModalMsg();

    try {
      const detail = await SystemApi.api("/user/resource/" + resourceId, {
        method: "GET",
      });

      // SystemApi.api() 返回的是 json.data，因此后端可能返回两种结构：
      // 1) ResourceVO 对象（带 stockList）：detail.stockList
      // 2) 直接返回库存列表数组：detail 为数组
      const stocks = Array.isArray(detail) ? detail : (detail && detail.stockList) || [];
      const name = Array.isArray(detail) ? "" : ((detail && detail.name) || "");
      stockModalTitle.textContent = `选择库存预约 - ${name || resourceId}`;

      const availableStocks = stocks
        .filter((s) => s && s.id != null && getRemainStock(s) > 0)
        .sort((a, b) => Number(a.id) - Number(b.id));

      stockOptionsEl.innerHTML = "";

      if (availableStocks.length === 0) {
        stockModalSub.textContent = "该资源暂无可预约库存";
        showModalMsg("暂无可预约库存。", "error");
        confirmBookBtn.disabled = true;
        return;
      }

      stockModalSub.textContent = `共 ${availableStocks.length} 个可预约时段`;

      availableStocks.forEach((s) => {
        const stockId = s.id;
        const dateText = s.stockDate ? toDateInput(s.stockDate) : "";
        const startText = s.slotStart ? toTimeText(s.slotStart) : "";
        const endText = s.slotEnd ? toTimeText(s.slotEnd) : "";
        const remainText = typeof s.remainStock !== "undefined" ? s.remainStock : "";
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "btn stock-option-btn";
        btn.dataset.stockId = stockId;
        btn.innerHTML = `
          <div style="display:flex; flex-direction:column; align-items:flex-start; gap:6px;">
            <div style="font-weight:800;">${dateText}</div>
            <div class="small">${startText} - ${endText}</div>
            <div class="small">剩余库存：${remainText}</div>
          </div>
        `;
        btn.addEventListener("click", () => selectStock(stockId, btn));
        stockOptionsEl.appendChild(btn);
      });

      // 默认选中第一个库存
      const first = availableStocks[0];
      if (first && first.id != null) {
        const firstBtn = stockOptionsEl.querySelector(`button[data-stock-id="${first.id}"]`);
        if (firstBtn) selectStock(first.id, firstBtn);
      }
    } catch (e) {
      stockModalSub.textContent = "";
      showModalMsg(e.message || "加载库存失败", "error");
      confirmBookBtn.disabled = true;
    }
  }

  confirmBookBtn.addEventListener("click", async () => {
    if (!selectedStockId) {
      showModalMsg("请选择一个库存。", "error");
      return;
    }
    const ok = confirm("确认预约该库存时段？");
    if (!ok) return;
    confirmBookBtn.disabled = true;

    try {
      const orderNum = await SystemApi.api("/booking", {
        method: "POST",
        query: { stock_id: selectedStockId },
      });
      showMsg(`预约成功！订单号：${orderNum}`, "ok");
      closeStockModal();
      loadList();
    } catch (err) {
      showModalMsg(err.message || "预约失败", "error");
      confirmBookBtn.disabled = false;
    }
  });

  stockModalCloseBtn.addEventListener("click", closeStockModal);
  cancelBookBtn.addEventListener("click", closeStockModal);

  // 点击遮罩关闭
  stockModalOverlay.addEventListener("click", (e) => {
    if (e.target === stockModalOverlay) closeStockModal();
  });

  function showMsg(text, type) {
    msgEl.style.display = "block";
    msgEl.classList.remove("error", "ok");
    msgEl.classList.add(type === "ok" ? "ok" : "error");
    msgEl.textContent = text;
  }

  function toTimeInput(v) {
    if (!v) return "";
    if (v.includes("T")) v = v.split("T")[1];
    return v.length >= 5 ? v.slice(0, 5) : v;
  }

  function toTimeText(v) {
    if (!v) return "";
    // e.g. "09:00:00" or "09:00"
    const s = String(v);
    return s.length >= 5 ? s.slice(0, 5) : s;
  }

  function toDateInput(v) {
    if (!v) return "";
    return String(v).slice(0, 10);
  }

  function getTotalStock(s) {
    if (!s) return 0;
    const v = s.totalStock ?? s.total_stock ?? s.totalstock ?? null;
    const n = Number(v);
    return Number.isFinite(n) ? n : 0;
  }

  function getRemainStock(s) {
    if (!s) return 0;
    const v = s.remainStock ?? s.remain_stock ?? s.remainstock ?? null;
    const n = Number(v);
    return Number.isFinite(n) ? n : 0;
  }

  function renderTable(resourceList) {
    tbody.innerHTML = "";
    if (!resourceList || resourceList.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="small">暂无数据</td></tr>';
      return;
    }

    resourceList.forEach((resource) => {
      const stocks = (resource.stockList || []);
      // 后端可能返回两种结构：
      // 1) 有 stockList：每个时段有 totalStock/remainStock，并可用它们求和
      // 2) stockList 为 null：直接使用资源自身的 totalStock/remainStock
      const totalStockSum = stocks.length > 0
        ? stocks.reduce((sum, s) => sum + getTotalStock(s), 0)
        : getTotalStock(resource);
      const remainStockSum = stocks.length > 0
        ? stocks.reduce((sum, s) => sum + getRemainStock(s), 0)
        : getRemainStock(resource);

      const firstAvailableStock = stocks.length > 0
        ? (stocks.find((s) => s && s.id != null && getRemainStock(s) > 0) || null)
        : null;

      const stockBtnDisabled = remainStockSum <= 0;
      const stockBtnText = stockBtnDisabled ? "暂无可预约时段" : "预约";

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${resource.id ?? "-"}</td>
        <td>${resource.name ?? "-"}</td>
        <td>${totalStockSum}</td>
        <td>${remainStockSum}</td>
        <td>
          <button
            class="btn primary"
            type="button"
            data-action="open-stock"
            data-resource-id="${resource.id ?? ""}"
            ${stockBtnDisabled ? "disabled" : ""}
          >
            ${stockBtnText}
          </button>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  async function loadList() {
    try {
      showMsg("加载中…", "ok");
      const typeVal = (typeSelectEl.value || "").trim();
      const type = typeVal ? Number(typeVal) : undefined;
      const list = await SystemApi.api("/user/resource/page", {
        method: "GET",
        query: { type, current },
      });
      renderTable(list || []);
      hasNext = Array.isArray(list) && list.length === MAX_PAGE_SIZE;
      pageInfo.textContent = `当前页：${current}（${hasNext ? "可能有下一页" : "已到最后一页"}）`;
      prevBtn.disabled = current <= 1;
      nextBtn.disabled = !hasNext;
      msgEl.style.display = "none";
    } catch (e) {
      showMsg(e.message || "加载失败", "error");
    }
  }

  searchBtn.addEventListener("click", () => {
    current = 1;
    loadList();
  });

  prevBtn.addEventListener("click", () => {
    if (current <= 1) return;
    current--;
    loadList();
  });

  nextBtn.addEventListener("click", () => {
    if (!hasNext) return;
    current++;
    loadList();
  });

  tbody.addEventListener("click", async (e) => {
    const btn = e.target.closest("button");
    if (!btn) return;
    const action = btn.dataset.action;
    if (action !== "open-stock") return;

    const resourceId = btn.dataset.resourceId;
    if (!resourceId) return;
    openStockModal(resourceId);
  });

  loadList();
</script>
</body>
</html>
