<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>管理员资源管理</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    /* 新增/覆盖样式 */
    .resource-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 1100px) {
      .resource-grid {
        grid-template-columns: 1fr;
      }
    }

    /* 左侧列表优化 */
    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .list-stats {
      font-size: 12px;
      color: var(--muted);
    }

    .search-box {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .search-box input {
      flex: 1;
      min-width: 200px;
    }

    /* 资源卡片列表 */
    .resource-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: calc(100vh - 280px);
      overflow-y: auto;
      padding-right: 4px;
    }

    .resource-list::-webkit-scrollbar {
      width: 6px;
    }

    .resource-list::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.03);
      border-radius: 3px;
    }

    .resource-list::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
    }

    .resource-card {
      background: var(--card2);
      border: 1px solid var(--line);
      border-radius: var(--radius2);
      padding: 14px;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .resource-card:hover {
      border-color: rgba(94,234,212,0.25);
      background: rgba(94,234,212,0.04);
      transform: translateX(4px);
    }

    .resource-card.active {
      border-color: var(--primary);
      background: rgba(94,234,212,0.08);
    }

    .resource-card-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 10px;
    }

    .resource-id {
      font-size: 11px;
      color: var(--muted);
      font-family: monospace;
      background: rgba(255,255,255,0.06);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .resource-name {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .stock-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .stock-tag {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stock-tag.has-stock {
      border-color: rgba(94,234,212,0.3);
      color: var(--primary);
      background: rgba(94,234,212,0.08);
    }

    .stock-tag.low-stock {
      border-color: rgba(251,191,36,0.3);
      color: var(--warning);
      background: rgba(251,191,36,0.08);
    }

    .stock-time {
      font-family: monospace;
      opacity: 0.8;
    }

    .resource-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 8px;
    }

    /* 分页 */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .page-info {
      font-size: 13px;
      color: var(--muted);
      min-width: 120px;
      text-align: center;
    }

    /* 右侧表单优化 */
    .form-card {
      position: sticky;
      top: 20px;
    }

    .form-section {
      margin-bottom: 20px;
    }

    .form-section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .form-row.three-col {
      grid-template-columns: 1.2fr 0.9fr 0.9fr;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-field label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    .form-field input,
    .form-field select {
      padding: 10px 12px;
      border-radius: 10px;
    }

    .form-field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(94,234,212,0.1);
    }

    .stock-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .stock-bar {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .stock-bar-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .stock-bar-fill.low {
      background: var(--warning);
    }

    .stock-bar-fill.critical {
      background: var(--danger);
    }

    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
    }

    .form-actions .btn {
      flex: 1;
      justify-content: center;
      padding: 12px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .form-row,
      .form-row.three-col {
        grid-template-columns: 1fr;
      }

      .resource-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
<div class="wrap">
  <!-- 顶部导航 -->
  <div class="topbar">
    <div class="brand">
      <div class="title">资源管理系统</div>
      <div class="sub">管理员控制台 · 库存时段管理</div>
    </div>
    <div class="nav">
      <a class="btn ghost" href="user-resource.html">用户端</a>
      <a class="btn ghost" href="stock-change-log.html">库存日志</a>
      <a class="btn ghost" href="index.html">首页</a>
      <button id="logoutBtn" class="btn danger" type="button">退出登录</button>
    </div>
  </div>

  <!-- 主内容区 -->
  <div class="resource-grid">
    <!-- 左侧：资源列表 -->
    <div class="card">
      <div class="list-header">
        <h2 style="margin:0; font-size:16px;">📋 资源列表</h2>
        <span class="list-stats" id="listStats">加载中...</span>
      </div>

      <!-- 搜索 -->
      <div class="search-box">
        <input id="searchName" type="text" placeholder="搜索资源名称..."/>
        <button id="searchBtn" class="btn primary" type="button">搜索</button>
      </div>

      <!-- 资源卡片列表 -->
      <div id="resourceList" class="resource-list">
        <div class="empty-state">
          <div class="empty-state-icon">📦</div>
          <div>暂无资源数据</div>
        </div>
      </div>

      <!-- 分页 -->
      <div class="pagination">
        <button id="prevBtn" class="btn btn-sm" type="button" disabled>← 上一页</button>
        <span class="page-info" id="pageInfo">第 1 页</span>
        <button id="nextBtn" class="btn btn-sm" type="button" disabled>下一页 →</button>
      </div>

      <div id="listMsg" class="msg" style="display:none; margin-top:12px;"></div>
    </div>

    <!-- 右侧：编辑表单 -->
    <div class="card form-card">
      <h2 style="margin:0 0 16px 0; font-size:16px;">✏️ 编辑资源库存</h2>

      <div class="hint" style="margin-bottom:20px; padding:10px 12px; background:rgba(94,234,212,0.06); border-radius:8px; border-left:3px solid var(--primary);">
        选择一个资源时段进行编辑，或填写下方表单创建新时段。
      </div>

      <!-- 隐藏字段 -->
      <input id="resourceId" type="hidden"/>
      <input id="stockId" type="hidden"/>

      <!-- 基本信息 -->
      <div class="form-section">
        <div class="form-section-title">基本信息</div>
        <div class="form-row">
          <div class="form-field" style="flex:2;">
            <label>资源名称</label>
            <input id="name" type="text" placeholder="例如：羽毛球场A区"/>
          </div>
          <div class="form-field" style="flex:1;">
            <label>资源类型</label>
            <input id="type" type="number" placeholder="1" min="1"/>
          </div>
        </div>
      </div>

      <!-- 时段信息 -->
      <div class="form-section">
        <div class="form-section-title">时段设置</div>
        <div class="form-row three-col">
          <div class="form-field">
            <label>日期</label>
            <input id="stockDate" type="date"/>
          </div>
          <div class="form-field">
            <label>开始时间</label>
            <input id="slotStart" type="time"/>
          </div>
          <div class="form-field">
            <label>结束时间</label>
            <input id="slotEnd" type="time"/>
          </div>
        </div>
      </div>

      <!-- 库存设置 -->
      <div class="form-section">
        <div class="form-section-title">库存配置</div>
        <div class="form-row">
          <div class="form-field">
            <label>总库存</label>
            <input id="totalStock" type="number" min="0" placeholder="0"/>
          </div>
          <div class="form-field">
            <label>剩余库存</label>
            <input id="remainStock" type="number" min="0" placeholder="0"/>
          </div>
        </div>
        <div class="stock-indicator">
          <span>库存状态</span>
          <div class="stock-bar">
            <div id="stockBarFill" class="stock-bar-fill" style="width:0%"></div>
          </div>
          <span id="stockPercent">0%</span>
        </div>
      </div>

      <!-- 操作按钮 -->
      <div class="form-actions">
        <button id="resetBtn" class="btn" type="button">清空</button>
        <button id="saveBtn" class="btn primary" type="button">保存更改</button>
      </div>

      <div id="formMsg" class="msg" style="display:none; margin-top:16px;"></div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  const MAX_PAGE_SIZE = 10;
  const TOKEN_KEY = "auth_token";

  // DOM 元素
  const resourceListEl = document.getElementById("resourceList");
  const listMsg = document.getElementById("listMsg");
  const pageInfo = document.getElementById("pageInfo");
  const listStats = document.getElementById("listStats");

  const searchNameEl = document.getElementById("searchName");
  const searchBtn = document.getElementById("searchBtn");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");

  // 表单元素
  const resourceIdEl = document.getElementById("resourceId");
  const stockIdEl = document.getElementById("stockId");
  const nameEl = document.getElementById("name");
  const typeEl = document.getElementById("type");
  const stockDateEl = document.getElementById("stockDate");
  const slotStartEl = document.getElementById("slotStart");
  const slotEndEl = document.getElementById("slotEnd");
  const totalStockEl = document.getElementById("totalStock");
  const remainStockEl = document.getElementById("remainStock");
  const stockBarFill = document.getElementById("stockBarFill");
  const stockPercent = document.getElementById("stockPercent");

  const saveBtn = document.getElementById("saveBtn");
  const resetBtn = document.getElementById("resetBtn");
  const formMsg = document.getElementById("formMsg");

  let current = 1;
  let lastName = "";
  let hasNext = false;
  let currentResources = [];

  // 工具函数
  function showListMsg(text, type) {
    listMsg.style.display = "block";
    listMsg.className = "msg " + (type === "ok" ? "ok" : "error");
    listMsg.textContent = text;
    setTimeout(() => listMsg.style.display = "none", 3000);
  }

  function showFormMsg(text, type) {
    formMsg.style.display = "block";
    formMsg.className = "msg " + (type === "ok" ? "ok" : "error");
    formMsg.textContent = text;
  }

  function clearForm() {
    resourceIdEl.value = "";
    stockIdEl.value = "";
    nameEl.value = "";
    typeEl.value = "";
    stockDateEl.value = "";
    slotStartEl.value = "";
    slotEndEl.value = "";
    totalStockEl.value = "";
    remainStockEl.value = "";
    updateStockBar(0, 0);
    document.querySelectorAll('.resource-card').forEach(c => c.classList.remove('active'));
    formMsg.style.display = "none";
  }

  function updateStockBar(remain, total) {
    if (!total || total <= 0) {
      stockBarFill.style.width = "0%";
      stockPercent.textContent = "0%";
      stockBarFill.className = "stock-bar-fill";
      return;
    }
    const percent = Math.round((remain / total) * 100);
    stockBarFill.style.width = percent + "%";
    stockPercent.textContent = percent + "%";

    stockBarFill.className = "stock-bar-fill";
    if (percent <= 20) stockBarFill.classList.add("critical");
    else if (percent <= 50) stockBarFill.classList.add("low");
  }

  function toTimeInput(v) {
    if (!v) return "";
    if (v.includes("T")) v = v.split("T")[1];
    return v.length >= 5 ? v.slice(0, 5) : v;
  }

  function toDateInput(v) {
    if (!v) return "";
    return String(v).slice(0, 10);
  }

  function formatDate(dateStr) {
    if (!dateStr) return "-";
    const d = new Date(dateStr);
    return `${d.getMonth()+1}月${d.getDate()}日`;
  }

  // 渲染资源卡片列表
  function renderResourceCards(resources) {
    currentResources = resources || [];
    resourceListEl.innerHTML = "";

    if (!resources || resources.length === 0) {
      resourceListEl.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">📭</div>
          <div>没有找到匹配的资源</div>
        </div>
      `;
      listStats.textContent = "0 个资源";
      return;
    }

    let totalStocks = 0;

    resources.forEach(r => {
      const stocks = r.stockList || [];
      totalStocks += stocks.length;

      const card = document.createElement("div");
      card.className = "resource-card";
      card.dataset.resourceId = r.id;

      // 构建库存标签
      let tagsHtml = "";
      if (stocks.length === 0) {
        tagsHtml = `<span class="stock-tag">暂无时段</span>`;
      } else {
        tagsHtml = stocks.slice(0, 3).map(s => {
          const remain = s.remainStock ?? s.remain_stock ?? 0;
          const total = s.totalStock ?? s.total_stock ?? 0;
          const isLow = remain / total <= 0.3;
          const isFull = remain === total;
          return `
            <span class="stock-tag ${isLow ? 'low-stock' : 'has-stock'}"
                  data-stock-id="${s.id}"
                  data-resource-id="${r.id}">
              <span class="stock-time">${toTimeInput(s.slotStart)}-${toTimeInput(s.slotEnd)}</span>
              <span>${remain}/${total}</span>
            </span>
          `;
        }).join("");
        if (stocks.length > 3) {
          tagsHtml += `<span class="stock-tag">+${stocks.length - 3} 个时段</span>`;
        }
      }

      card.innerHTML = `
        <div class="resource-card-header">
          <span class="resource-id">#${r.id}</span>
        </div>
        <div class="resource-name">${r.name || "未命名资源"}</div>
        <div class="stock-tags">${tagsHtml}</div>
        <div class="resource-actions">
          <button class="btn btn-sm" onclick="editResource('${r.id}')">编辑资源</button>
          <button class="btn danger btn-sm" onclick="deleteResource('${r.id}')">删除</button>
        </div>
      `;

      // 点击库存标签编辑时段
      card.querySelectorAll('.stock-tag[data-stock-id]').forEach(tag => {
        tag.addEventListener('click', (e) => {
          e.stopPropagation();
          const sid = tag.dataset.stockId;
          const rid = tag.dataset.resourceId;
          editStock(rid, sid);
        });
      });

      resourceListEl.appendChild(card);
    });

    listStats.textContent = `${resources.length} 个资源 · ${totalStocks} 个时段`;
  }

  // 加载列表
  async function loadList() {
    try {
      const list = await SystemApi.api("/admin/resource", {
        method: "GET",
        query: {
          name: lastName || undefined,
          current,
        },
      });

      renderResourceCards(list);
      hasNext = Array.isArray(list) && list.length === MAX_PAGE_SIZE;

      pageInfo.textContent = `第 ${current} 页${hasNext ? "" : " (末页)"}`;
      prevBtn.disabled = current <= 1;
      nextBtn.disabled = !hasNext;
    } catch (e) {
      showListMsg(e.message || "加载失败", "error");
    }
  }

  // 编辑资源（新建时段）
  window.editResource = async function(resourceId) {
    const resource = currentResources.find(r => String(r.id) === String(resourceId));
    if (!resource) return;

    clearForm();
    document.querySelectorAll('.resource-card').forEach(c => {
      c.classList.toggle('active', c.dataset.resourceId === resourceId);
    });

    resourceIdEl.value = resourceId;
    nameEl.value = resource.name || "";

    try {
      const detail = await SystemApi.api("/user/resource/" + resourceId, { method: "GET" });
      typeEl.value = detail?.type || "";
    } catch (e) {
      typeEl.value = "";
    }

    // 默认填充今天日期
    stockDateEl.value = new Date().toISOString().slice(0, 10);

    showFormMsg("已加载资源信息，请填写时段信息后保存", "ok");
  };

  // 编辑具体时段
  window.editStock = async function(resourceId, stockId) {
    const resource = currentResources.find(r => String(r.id) === String(resourceId));
    if (!resource) return;

    const stock = resource.stockList?.find(s => String(s.id) === String(stockId));
    if (!stock) return;

    clearForm();
    document.querySelectorAll('.resource-card').forEach(c => {
      c.classList.toggle('active', c.dataset.resourceId === resourceId);
    });

    resourceIdEl.value = resourceId;
    stockIdEl.value = stockId;
    nameEl.value = resource.name || "";
    typeEl.value = resource.type || "";
    stockDateEl.value = toDateInput(stock.stockDate);
    slotStartEl.value = toTimeInput(stock.slotStart);
    slotEndEl.value = toTimeInput(stock.slotEnd);

    const total = stock.totalStock ?? stock.total_stock ?? 0;
    const remain = stock.remainStock ?? stock.remain_stock ?? 0;
    totalStockEl.value = total;
    remainStockEl.value = remain;

    updateStockBar(remain, total);
    showFormMsg("已加载时段信息，修改后点击保存", "ok");
  };

  // 删除资源
  window.deleteResource = async function(resourceId) {
    const ok = confirm(`确定删除资源 #${resourceId} 吗？\n该操作将删除资源及其所有时段，且不可恢复。`);
    if (!ok) return;

    try {
      await SystemApi.apiRequest("/admin/resource/" + resourceId, { method: "DELETE" });
      showListMsg("删除成功", "ok");
      loadList();
      clearForm();
    } catch (err) {
      showListMsg(err.message || "删除失败", "error");
    }
  };

  // 事件监听
  searchBtn.addEventListener("click", () => {
    lastName = searchNameEl.value.trim();
    current = 1;
    loadList();
  });

  searchNameEl.addEventListener("keypress", (e) => {
    if (e.key === "Enter") searchBtn.click();
  });

  prevBtn.addEventListener("click", () => {
    if (current > 1) {
      current--;
      loadList();
    }
  });

  nextBtn.addEventListener("click", () => {
    if (hasNext) {
      current++;
      loadList();
    }
  });

  resetBtn.addEventListener("click", clearForm);

  // 库存输入实时更新进度条
  [totalStockEl, remainStockEl].forEach(el => {
    el.addEventListener("input", () => {
      updateStockBar(parseInt(remainStockEl.value) || 0, parseInt(totalStockEl.value) || 0);
    });
  });

  // 保存
  saveBtn.addEventListener("click", async () => {
    const payload = {
      id: resourceIdEl.value ? Number(resourceIdEl.value) : undefined,
      name: nameEl.value.trim(),
      type: typeEl.value === "" ? undefined : Number(typeEl.value),
      stockId: stockIdEl.value ? Number(stockIdEl.value) : undefined,
      stockDate: stockDateEl.value || undefined,
      slotStart: slotStartEl.value || undefined,
      slotEnd: slotEndEl.value || undefined,
      totalStock: totalStockEl.value === "" ? undefined : Number(totalStockEl.value),
      remainStock: remainStockEl.value === "" ? undefined : Number(remainStockEl.value),
    };

    // 验证
    if (!payload.name) return showFormMsg("请填写资源名称", "error");
    if (!payload.stockDate) return showFormMsg("请选择日期", "error");
    if (!payload.slotStart || !payload.slotEnd) return showFormMsg("请填写开始和结束时间", "error");
    if (payload.totalStock === undefined || payload.remainStock === undefined) {
      return showFormMsg("请填写库存数量", "error");
    }
    if (payload.remainStock > payload.totalStock) {
      return showFormMsg("剩余库存不能大于总库存", "error");
    }

    try {
      saveBtn.disabled = true;
      saveBtn.textContent = "保存中...";

      await SystemApi.apiRequest("/admin/resource", {
        method: "POST",
        body: payload,
      });

      showFormMsg(payload.stockId ? "时段更新成功" : "新建时段成功", "ok");
      clearForm();
      loadList();
    } catch (e) {
      showFormMsg(e.message || "保存失败", "error");
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = "保存更改";
    }
  });

  // 退出登录
  document.getElementById("logoutBtn").addEventListener("click", () => {
    localStorage.removeItem(TOKEN_KEY);
    window.location.href = "login.html";
  });

  // 初始化
  clearForm();
  loadList();
</script>
</body>
</html>
