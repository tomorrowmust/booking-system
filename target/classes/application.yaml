spring:
  application:
    name: system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://8.136.215.55:3306/booking_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 111111
  data:                    # ← 注意缩进，与 datasource 同级
    redis:
      host: 8.136.215.55
      port: 6379
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  # mybatis-plus 也应该在 spring 下，不是 server 下！
  # 但通常建议单独配置，检查你是否真的有这个需求

server:
  port: 8080

# mybatis-plus 正确位置（如果在 spring 下）
mybatis-plus:
  type-aliases-package: com.tomorrowmust.system.domain
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: ASSIGN_ID

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表
    enable-filter-multipart-apis: true
    enable-filter-multipart-api-method-type: POST

rocketmq:
  name-server: 8.136.215.55:9876
  producer:
    group: booking-producer-group