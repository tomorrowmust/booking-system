<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>库存变更日志</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <div class="title">管理员端 - 库存变更日志</div>
      <div class="sub">用于审计和对账（分页查询）</div>
    </div>
    <div class="nav">
      <a class="btn" href="admin-resource.html">返回管理员资源</a>
      <a class="btn ghost" href="index.html">首页</a>
      <button id="logoutBtn" class="btn danger" type="button">退出登录</button>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>查询条件</h2>
      <div class="row">
        <div class="field" style="flex: 1 1 260px;">
          <div class="label">订单号(orderNo)</div>
          <input id="orderNo" type="text" placeholder="支持模糊查询"/>
        </div>
        <div class="field" style="width: 220px;">
          <div class="label">库存ID(stockId)</div>
          <input id="stockId" type="number" placeholder="可不填"/>
        </div>
      </div>
      <div style="height: 12px;"></div>
      <div class="row">
        <button id="searchBtn" class="btn primary" type="button">查询</button>
        <button id="resetBtn" class="btn" type="button">清空条件</button>
      </div>

      <div style="height: 14px;"></div>
      <div class="row" style="justify-content: space-between;">
        <div class="small" id="pageInfo">当前页：1</div>
        <div class="row">
          <button id="prevBtn" class="btn" type="button">上一页</button>
          <button id="nextBtn" class="btn" type="button">下一页</button>
        </div>
      </div>

      <div style="height: 12px;"></div>
      <table>
        <thead>
        <tr>
          <th>日志ID</th>
          <th>订单号</th>
          <th>库存ID</th>
          <th>变动数量</th>
          <th>变动后剩余库存</th>
          <th>创建时间</th>
        </tr>
        </thead>
        <tbody id="tbody">
        <tr>
          <td colspan="6" class="small">暂无数据</td>
        </tr>
        </tbody>
      </table>

      <div id="msg" class="msg" style="display:none;"></div>
    </div>

    <div class="card">
      <h2>字段说明</h2>
      <div class="hint">
        <div style="margin-bottom: 10px;">
          - `changeCount`：通常为 `-1` 或 `1`，表示库存的增减
        </div>
        <div style="margin-bottom: 10px;">
          - `remainStock`：变动后的剩余库存
        </div>
        <div style="margin-bottom: 10px;">
          - `createTime`：日志创建时间
        </div>
      </div>
      <div style="height: 14px;"></div>
      <div class="msg ok">
        该页面会调用：`GET /stock-change-log/page`
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  const PAGE_SIZE = 10;

  const logoutBtn = document.getElementById("logoutBtn");
  logoutBtn.addEventListener("click", () => {
    SystemApi.clearToken();
    window.location.href = "login.html";
  });

  const orderNoEl = document.getElementById("orderNo");
  const stockIdEl = document.getElementById("stockId");
  const searchBtn = document.getElementById("searchBtn");
  const resetBtn = document.getElementById("resetBtn");

  const tbody = document.getElementById("tbody");
  const msgEl = document.getElementById("msg");
  const pageInfoEl = document.getElementById("pageInfo");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");

  let current = 1;
  let hasNext = true;

  function showMsg(text, type) {
    msgEl.style.display = "block";
    msgEl.classList.remove("error", "ok");
    msgEl.classList.add(type === "ok" ? "ok" : "error");
    msgEl.textContent = text;
  }

  function toDateTime(v) {
    if (!v) return "";
    // expected: 2026-03-25T10:20:30...
    if (String(v).includes("T")) return String(v).replace("T", " ").slice(0, 19);
    return String(v).slice(0, 19);
  }

  function renderTable(list) {
    tbody.innerHTML = "";
    if (!list || list.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="small">暂无数据</td></tr>';
      return;
    }

    list.forEach((it) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${it.id ?? "-"}</td>
        <td>${it.orderNo ?? "-"}</td>
        <td>${it.stockId ?? "-"}</td>
        <td>${it.changeCount ?? "-"}</td>
        <td>${it.remainStock ?? "-"}</td>
        <td>${toDateTime(it.createTime) || "-"}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  async function loadList() {
    try {
      showMsg("加载中…", "ok");
      const orderNo = (orderNoEl.value || "").trim();
      const stockIdRaw = (stockIdEl.value || "").trim();
      const stockId = stockIdRaw ? Number(stockIdRaw) : undefined;

      const list = await SystemApi.api("/stock-change-log/page", {
        method: "GET",
        query: {
          orderNo: orderNo || undefined,
          stockId: stockId,
          current,
        },
      });

      renderTable(list || []);
      hasNext = Array.isArray(list) && list.length === PAGE_SIZE;
      pageInfoEl.textContent = `当前页：${current}（${hasNext ? "可能有下一页" : "已到最后一页"}）`;
      prevBtn.disabled = current <= 1;
      nextBtn.disabled = !hasNext;
      msgEl.style.display = "none";
    } catch (e) {
      showMsg(e.message || "查询失败", "error");
    }
  }

  searchBtn.addEventListener("click", () => {
    current = 1;
    loadList();
  });

  resetBtn.addEventListener("click", () => {
    orderNoEl.value = "";
    stockIdEl.value = "";
    current = 1;
    loadList();
  });

  prevBtn.addEventListener("click", () => {
    if (current <= 1) return;
    current--;
    loadList();
  });

  nextBtn.addEventListener("click", () => {
    if (!hasNext) return;
    current++;
    loadList();
  });

  loadList();
</script>
</body>
</html>
