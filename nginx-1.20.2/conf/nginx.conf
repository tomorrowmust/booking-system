#user  nobody;
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    map $http_upgrade $connection_upgrade{
        default upgrade;
        '' close;
    }

    upstream webservers{
        server backend:8080 weight=90;   # ← 改这里：backend 是服务名
    }

    server {
        listen       80;
        server_name  localhost;

        location / {
            root   /usr/share/nginx/html/system;   # ← 也改这里：用绝对路径
            index  index.html index.htm;
        }

        # 反向代理,处理管理端发送的请求
        location /admin/ {
            proxy_pass   http://backend:8080/admin/;   # ← 改这里
            proxy_set_header Authorization $http_authorization;
        }

        # 反向代理,处理验证码/登录等认证请求
        location /auth/ {
            proxy_pass   http://webservers/auth/;
            proxy_set_header Authorization $http_authorization;
        }

        # 反向代理,处理用户端发送的请求
        location /user/ {
            proxy_pass   http://webservers/user/;
            proxy_set_header Authorization $http_authorization;
        }

        # 反向代理,处理预约下单请求
        location /booking {
            proxy_pass   http://webservers;
            proxy_set_header Authorization $http_authorization;
        }

        # 反向代理,处理库存变更日志查询
        location /stock-change-log {
            proxy_pass   http://webservers;
            proxy_set_header Authorization $http_authorization;
        }

        # WebSocket
        location /ws/ {
            proxy_pass   http://webservers/ws/;
            proxy_http_version 1.1;
            proxy_read_timeout 3600s;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "$connection_upgrade";
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}