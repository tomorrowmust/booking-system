#user  nobody;
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    map $http_upgrade $connection_upgrade{
        default upgrade;
        '' close;
    }

    upstream webservers{
        server localhost:8080 weight=90;        # ← 改这里：Docker 服务名
    }

    server {
        listen       80;
        server_name  localhost;
        charset utf-8;

        # ==================== API 代理配置 ====================

        location /api/ {
            proxy_pass   http://webservers/;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /auth/ {
            proxy_pass   http://webservers/auth/;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /user/ {
            proxy_pass   http://webservers/user/;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # SSE 流式接口 —— 禁用缓冲确保实时推送
        location /user/ai/stream {
            proxy_pass   http://webservers/user/ai/stream;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        # API路径的SSE流式接口
        location /api/user/ai/stream {
            proxy_pass   http://webservers/user/ai/stream;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        location /admin/resource {
            proxy_pass   http://webservers/admin/resource;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /admin/stock {
            proxy_pass   http://webservers/admin/stock;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /admin/log {
            proxy_pass   http://webservers/admin/log;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /admin/embedding {
            proxy_pass   http://webservers/admin/embedding;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /admin/order {
            proxy_pass   http://webservers/admin/order;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /ws/ {
            proxy_pass   http://webservers/ws/;
            proxy_http_version 1.1;
            proxy_read_timeout 3600s;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "$connection_upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /v3/api-docs {
            proxy_pass   http://webservers/v3/api-docs;
        }
        location /swagger-ui {
            proxy_pass   http://webservers/swagger-ui;
        }
        location /doc.html {
            proxy_pass   http://webservers/doc.html;
        }
        location /webjars {
            proxy_pass   http://webservers/webjars;
        }
        location /swagger-resources {
            proxy_pass   http://webservers/swagger-resources;
        }

        # ==================== Vue 静态资源配置 ====================

        location / {
            root   html/system-dist;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}