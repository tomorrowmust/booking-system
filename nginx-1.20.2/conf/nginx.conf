#user  nobody;
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    map $http_upgrade $connection_upgrade{
        default upgrade;
        '' close;
    }

    upstream webservers{
        server 127.0.0.1:8080 weight=90;
    }

    server {
        listen       80;
        server_name  localhost;

        # ==================== API 代理配置 ====================

        # 反向代理: 管理端接口 /admin/*
        location /admin/ {
            proxy_pass   http://webservers/admin/;
            proxy_set_header Authorization $http_authorization;
        }

        # 反向代理: 认证接口 /auth/*
        location /auth/ {
            proxy_pass   http://webservers/auth/;
            proxy_set_header Authorization $http_authorization;
        }

        # 反向代理: 用户端接口 /user/*
        location /user/ {
            proxy_pass   http://webservers/user/;
            proxy_set_header Authorization $http_authorization;
        }

        # 反向代理: 预约下单接口 /booking
        location /booking {
            proxy_pass   http://webservers/booking;
            proxy_set_header Authorization $http_authorization;
        }

        # 反向代理: 库存变更日志 /stock-change-log
        location /stock-change-log {
            proxy_pass   http://webservers/stock-change-log;
            proxy_set_header Authorization $http_authorization;
        }

        # 反向代理: WebSocket
        location /ws/ {
            proxy_pass   http://webservers/ws/;
            proxy_http_version 1.1;
            proxy_read_timeout 3600s;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "$connection_upgrade";
        }

        # 反向代理: Swagger/OpenAPI
        location /v3/api-docs {
            proxy_pass   http://webservers/v3/api-docs;
        }
        location /swagger-ui {
            proxy_pass   http://webservers/swagger-ui;
        }
        location /doc.html {
            proxy_pass   http://webservers/doc.html;
        }
        location /webjars {
            proxy_pass   http://webservers/webjars;
        }
        location /swagger-resources {
            proxy_pass   http://webservers/swagger-resources;
        }

        # ==================== 静态资源配置 ====================

        location / {
            root   html/system-dist;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
