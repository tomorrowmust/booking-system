version: '3'

services:
  backend:
    image: openjdk:17-alpine
    container_name: backend
    volumes:
      - /home/user/system-0.0.1-SNAPSHOT.jar:/app.jar
    command: java -jar /app.jar
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/nginx/html/system:/usr/share/nginx/html/system:ro
      # - /opt/nginx/logs:/var/log/nginx  # 可选：需要就加上
    depends_on:
      - backend
    restart: always