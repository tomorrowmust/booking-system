<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>系统维护中 - 智慧预约系统</title>
  <style>
    body {
      width: 35em;
      margin: 0 auto;
      font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #F8FAFC;
      color: #1e293b;
    }
    .container { text-align: center; }
    .code { font-size: 6rem; font-weight: 800; background: linear-gradient(135deg, #4f46e5, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    a { color: #4f46e5; }
  </style>
</head>
<body>
<div class="container">
  <div class="code">500</div>
  <h1>服务暂时不可用</h1>
  <p>抱歉，服务器遇到了临时问题，请稍后再试。</p>
  <p><a href="/">返回首页</a></p>
</div>
</body>
</html>
