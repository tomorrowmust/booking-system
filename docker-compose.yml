version: '3.8'

services:
  # MySQL
  mysql:
    image: mysql:8.0
    container_name: mysql8
    environment:
      MYSQL_ROOT_PASSWORD: 111111
      MYSQL_DATABASE: booking_system
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
    networks:
      - app-network

  # Redis
  redis:
    image: redis:latest
    container_name: my-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - app-network

  # RocketMQ NameServer（限制 500MB）
  rmqnamesrv:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/apache/rocketmq:5.4.0
    container_name: rmqnamesrv
    command: sh -c "export JAVA_OPT_EXT='-server -Xms256m -Xmx256m -Xmn128m' && sh mqnamesrv"
    deploy:
      resources:
        limits:
          memory: 500M
    ports:
      - "9876:9876"
    restart: always
    networks:
      - app-network

  # RocketMQ Broker（限制 500MB）
  rmqbroker:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/apache/rocketmq:5.4.0
    container_name: rmqbroker
    command: sh -c "export JAVA_OPT_EXT='-server -Xms256m -Xmx256m -Xmn128m' && export NAMESRV_ADDR='rmqnamesrv:9876' && sh mqbroker"
    deploy:
      resources:
        limits:
          memory: 500M
    depends_on:
      - rmqnamesrv
    restart: always
    networks:
      - app-network

  # Java 后端
  backend:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/openjdk:17
    container_name: backend
    pull_policy: never
    volumes:
      - /home/user/system-0.0.1-SNAPSHOT.jar:/app.jar
    command: java -jar /app.jar
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=111111
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ROCKETMQ_NAMESRV=rmqnamesrv:9876
    depends_on:
      - mysql
      - redis
      - rmqnamesrv
      - rmqbroker
    restart: always
    networks:
      - app-network

  # Nginx
  nginx:
    image: nginx:latest
    container_name: nginx
    pull_policy: never
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/nginx/html/system:/usr/share/nginx/html/system:ro
    depends_on:
      - backend
    restart: always
    networks:
      - app-network

volumes:
  mysql_data:
  redis_data:

networks:
  app-network:
    driver: bridge