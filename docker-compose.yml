version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql8
    environment:
      MYSQL_ROOT_PASSWORD: 111111
      MYSQL_DATABASE: booking_system
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p111111"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: my-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always
    networks:
      - app-network

  rmqnamesrv:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/apache/rocketmq:5.4.0
    container_name: rmqnamesrv
    environment:
      JAVA_OPT_EXT: "-server -Xms512m -Xmx512m -Xmn256m"
    command: sh mqnamesrv
    deploy:
      resources:
        limits:
          memory: 1G
    ports:
      - "9876:9876"
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 9876 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - app-network

  rmqbroker:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/apache/rocketmq:5.4.0
    container_name: rmqbroker
    environment:
      JAVA_OPT_EXT: "-server -Xms512m -Xmx512m -Xmn256m"
      NAMESRV_ADDR: "rmqnamesrv:9876"
    command: sh mqbroker -c /home/rocketmq/conf/broker.conf
    deploy:
      resources:
        limits:
          memory: 1G
    ports:
      - "10909:10909"
      - "10911:10911"
    volumes:
      - ./broker.conf:/home/rocketmq/conf/broker.conf
    depends_on:
      rmqnamesrv:
        condition: service_healthy
    restart: always
    networks:
      - app-network

  backend:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/openjdk:17
    container_name: backend
    volumes:
      - ./backend/app.jar:/app.jar
    command: >
      sh -c "
        echo 'Waiting for MySQL...' &&
        until bash -c 'exec 3<>/dev/tcp/mysql/3306' 2>/dev/null; do sleep 2; done &&
        echo 'Waiting for Redis...' &&
        until bash -c 'exec 3<>/dev/tcp/redis/6379' 2>/dev/null; do sleep 2; done &&
        echo 'Starting backend...' &&
        java -jar /app.jar
      "
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=111111
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ROCKETMQ_NAMESRV=rmqnamesrv:9876
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rmqnamesrv:
        condition: service_healthy
      rmqbroker:
        condition: service_started
    restart: always
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html/system-dist:/usr/share/nginx/html/system-dist:ro
    depends_on:
      - backend
    restart: always
    networks:
      - app-network

volumes:
  mysql_data:
  redis_data:

networks:
  app-network:
    driver: bridge